
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Customer List</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #0F1F38; /* dark background */
      margin: 0;
      padding: 0;
      color: #fff; /* default text color */
    }
    header {
      background: #2978EE; /* bright blue header */
      color: #fff;
      padding: 20px;
      text-align: center;
    }
    main {
      max-width: 800px;
      margin: 40px auto;
      background: #fff;
      color: #0F1F38; /* dark text inside main */
      padding: 20px;
      border-radius: 8px;
      box-shadow: 0 2px 6px rgba(0,0,0,0.2);
    }
    h2 {
      text-align: center;
      margin-bottom: 20px;
      color: #2978EE; /* blue section title */
    }
    ul {
      list-style: none;
      padding: 0;
    }
    li {
      padding: 10px;
      border-bottom: 1px solid #ddd;
    }
    li:last-child {
      border-bottom: none;
    }
  </style>
</head>
<body>
  <header>
    <h1>Our Customers</h1>
  </header>
  <main>
    <h2>Customer Names</h2>
    <ul id="customer-list">
      <!-- i will add c++ later >
    </ul>
  </main>
</body>
</html>
